services:
  app:
    build:
      context: .
      dockerfile: ./php/Dockerfile
    container_name: php_app
    volumes:
      - ./../app:/var/www
    depends_on:
      - db
      - redis
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=local
      - APP_DEBUG=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network

  db:
    image: postgres:18-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    networks:
      - app-network

  redis:
    image: redis:8
    container_name: redis_cache
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
